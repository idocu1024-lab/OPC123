name: Setup All (migrate + seed + deploy)

on:
  push:
    paths: ['.github/workflows/setup-all.yml']

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: f4bae72836f82c0e6f1fbc2b7baeb9c1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Migrate DB
        working-directory: api
        run: echo 'y' | wrangler d1 execute xls-db --remote --file=migrate-media.sql || true

      - name: Seed DB
        working-directory: api
        run: echo 'y' | wrangler d1 execute xls-db --remote --file=seed.sql

      - name: Deploy Worker
        working-directory: api
        run: wrangler deploy

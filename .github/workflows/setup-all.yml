name: Setup All (migrate + seed + deploy)

on:
  push:
    paths: ['.github/workflows/setup-all.yml']

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Migrate DB
        run: wrangler d1 execute xls-db --remote --file=api/migrate-media.sql --config=api/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f4bae72836f82c0e6f1fbc2b7baeb9c1

      - name: Seed DB
        run: wrangler d1 execute xls-db --remote --file=api/seed.sql --config=api/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f4bae72836f82c0e6f1fbc2b7baeb9c1

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: f4bae72836f82c0e6f1fbc2b7baeb9c1
          workingDirectory: api

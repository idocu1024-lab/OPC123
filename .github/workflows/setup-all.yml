name: Setup All (migrate + seed + deploy)

on:
  push:
    paths: ['.github/workflows/setup-all.yml']

jobs:
  setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: f4bae72836f82c0e6f1fbc2b7baeb9c1
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler
        working-directory: .

      - name: Migrate DB
        run: wrangler d1 execute xls-db --remote --file=migrate-media.sql

      - name: Seed DB
        run: wrangler d1 execute xls-db --remote --file=seed.sql

      - name: Deploy Worker
        run: wrangler deploy

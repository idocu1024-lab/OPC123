name: Process Article Issue

# 当 OpenClaw 创建带 [文章] 前缀的 Issue 时，自动解析内容并更新 articles.json
# 如果 OpenClaw 没提供封面图，自动从文章页面抓取 og:image

on:
  issues:
    types: [opened]

jobs:
  process-article:
    # 只处理标题以 [文章] 开头的 Issue
    if: startsWith(github.event.issue.title, '[文章]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse issue, fetch cover image, and update articles.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const crypto = require('crypto');
            const https = require('https');
            const http = require('http');

            // --- 辅助函数：抓取网页 HTML ---
            function fetchUrl(url, maxRedirects = 5) {
              return new Promise((resolve, reject) => {
                if (maxRedirects <= 0) return reject(new Error('Too many redirects'));
                const client = url.startsWith('https') ? https : http;
                const req = client.get(url, {
                  headers: { 'User-Agent': 'Mozilla/5.0 (compatible; OPC123Bot/1.0)' },
                  timeout: 10000
                }, (res) => {
                  if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                    let redirectUrl = res.headers.location;
                    if (redirectUrl.startsWith('/')) {
                      const parsed = new URL(url);
                      redirectUrl = `${parsed.protocol}//${parsed.host}${redirectUrl}`;
                    }
                    return fetchUrl(redirectUrl, maxRedirects - 1).then(resolve).catch(reject);
                  }
                  let body = '';
                  res.on('data', chunk => body += chunk);
                  res.on('end', () => resolve(body));
                });
                req.on('error', reject);
                req.on('timeout', () => { req.destroy(); reject(new Error('Timeout')); });
              });
            }

            // --- 辅助函数：从 HTML 提取 og:image ---
            function extractOgImage(html) {
              // 尝试 og:image
              const ogMatch = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
                || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
              if (ogMatch) return ogMatch[1];

              // 尝试 twitter:image
              const twMatch = html.match(/<meta[^>]+name=["']twitter:image["'][^>]+content=["']([^"']+)["']/i)
                || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+name=["']twitter:image["']/i);
              if (twMatch) return twMatch[1];

              // 尝试文章内第一张大图
              const imgMatch = html.match(/<img[^>]+src=["']([^"']+\.(?:jpg|jpeg|png|webp)(?:\?[^"']*)?)["'][^>]*>/i);
              if (imgMatch && !imgMatch[1].includes('icon') && !imgMatch[1].includes('logo') && !imgMatch[1].includes('avatar')) {
                return imgMatch[1];
              }

              return null;
            }

            // --- 辅助函数：验证图片 URL 可访问 ---
            function checkImageUrl(url) {
              return new Promise((resolve) => {
                const client = url.startsWith('https') ? https : http;
                const req = client.request(url, {
                  method: 'HEAD',
                  headers: { 'User-Agent': 'Mozilla/5.0 (compatible; OPC123Bot/1.0)' },
                  timeout: 5000
                }, (res) => {
                  resolve(res.statusCode >= 200 && res.statusCode < 400);
                });
                req.on('error', () => resolve(false));
                req.on('timeout', () => { req.destroy(); resolve(false); });
                req.end();
              });
            }

            // ========== 主逻辑 ==========

            // --- 辅助函数：清理 JSON 字符串中的引号问题 ---
            function sanitizeJsonString(str) {
              // 替换 smart/curly quotes 为 straight quotes
              str = str.replace(/[\u201C\u201D]/g, '\\"');
              // 替换全角引号
              str = str.replace(/[\uFF02]/g, '\\"');

              // 修复 JSON 值内的未转义双引号：
              // 逐行处理，在 "key": "value" 格式中，把 value 内的裸双引号替换为中文引号
              str = str.replace(/"(summary|title)":\s*"((?:[^"\\]|\\.)*)"/g, (match) => {
                return match; // 如果能正常匹配，说明没问题
              });

              // 更激进的修复：尝试逐行处理
              const lines = str.split('\n');
              const fixed = lines.map(line => {
                const trimmed = line.trim();
                // 匹配 "key": "..." 模式
                const m = trimmed.match(/^"(\w+)":\s*"(.*)"\s*,?\s*$/);
                if (m && m[1] && m[2]) {
                  const key = m[1];
                  let val = m[2];
                  // 如果 value 中有未转义的双引号，替换为中文引号「」
                  if (val.includes('"') && !val.includes('\\"')) {
                    val = val.replace(/"([^"]+)"/g, '「$1」');
                    const comma = trimmed.endsWith(',') ? ',' : '';
                    return line.replace(trimmed, `"${key}": "${val}"${comma}`);
                  }
                }
                return line;
              });
              return fixed.join('\n');
            }

            // 1. 读取 Issue body（JSON 格式）
            let issueBody = context.payload.issue.body;
            console.log('Issue body:', issueBody);

            let articleData;
            try {
              articleData = JSON.parse(issueBody);
            } catch (e) {
              console.log('First parse failed, trying to sanitize...');
              // 尝试清理后再解析
              try {
                const sanitized = sanitizeJsonString(issueBody);
                articleData = JSON.parse(sanitized);
                console.log('Sanitized parse succeeded');
              } catch (e1) {
                // 尝试从 markdown code block 提取
                const jsonMatch = issueBody.match(/```(?:json)?\s*([\s\S]*?)```/);
                if (jsonMatch) {
                  try {
                    articleData = JSON.parse(jsonMatch[1].trim());
                  } catch (e2) {
                    try {
                      const sanitized = sanitizeJsonString(jsonMatch[1].trim());
                      articleData = JSON.parse(sanitized);
                    } catch (e3) {
                      console.error('All parse attempts failed:', e3);
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: '❌ 无法解析文章数据，请检查 JSON 格式（可能有未转义的引号）。'
                      });
                      return;
                    }
                  }
                } else {
                  console.error('No JSON found in issue body');
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: '❌ Issue body 中未找到 JSON 数据。'
                  });
                  return;
                }
              }
            }

            // 清理所有文本字段中的残留引号问题
            for (const key of ['title', 'summary']) {
              if (articleData[key]) {
                // 把 ASCII 双引号替换为中文书名号引号
                articleData[key] = articleData[key].replace(/"([^"]+)"/g, '「$1」');
                // 替换 smart quotes
                articleData[key] = articleData[key].replace(/[\u201C]/g, '「').replace(/[\u201D]/g, '」');
              }
            }

            // 2. 验证必填字段
            if (!articleData.title || !articleData.url) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '❌ 缺少必填字段：title 和 url。'
              });
              return;
            }

            // 3. 读取当前 articles.json
            const articlesPath = 'data/articles.json';
            const rawData = fs.readFileSync(articlesPath, 'utf8');
            const data = JSON.parse(rawData);

            // 4. 去重检查
            const isDuplicate = data.articles.some(a => a.url === articleData.url);
            if (isDuplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '⚠️ 这篇文章之前已经添加过了，URL 重复。'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed'
              });
              return;
            }

            // 5. 如果 OpenClaw 没提供封面图，自动抓取
            let imageUrl = articleData.image || null;
            if (!imageUrl) {
              console.log('No image provided, fetching og:image from article URL...');
              try {
                const html = await fetchUrl(articleData.url);
                imageUrl = extractOgImage(html);
                if (imageUrl) {
                  // 处理相对 URL
                  if (imageUrl.startsWith('//')) {
                    imageUrl = 'https:' + imageUrl;
                  } else if (imageUrl.startsWith('/')) {
                    const parsed = new URL(articleData.url);
                    imageUrl = `${parsed.protocol}//${parsed.host}${imageUrl}`;
                  }
                  // 验证图片可访问
                  const isValid = await checkImageUrl(imageUrl);
                  if (isValid) {
                    console.log(`Found valid cover image: ${imageUrl}`);
                  } else {
                    console.log(`Image URL not accessible: ${imageUrl}`);
                    imageUrl = null;
                  }
                } else {
                  console.log('No og:image found in article page');
                }
              } catch (err) {
                console.log(`Failed to fetch article page: ${err.message}`);
              }
            }

            // 6. 构建文章对象
            const randomHex = crypto.randomBytes(4).toString('hex');
            const today = new Date().toISOString().split('T')[0];
            const newArticle = {
              id: `art-${randomHex}`,
              title: articleData.title,
              url: articleData.url,
              summary: articleData.summary || '',
              category: articleData.category || 'getting-started',
              tags: articleData.tags || [],
              source: articleData.source || '',
              datePublished: articleData.datePublished || articleData.published || today,
              language: articleData.language || 'en'
            };

            if (imageUrl) {
              newArticle.image = imageUrl;
            }

            // 7. 插入到数组最前面
            data.articles.unshift(newArticle);

            // 8. 写回文件
            fs.writeFileSync(articlesPath, JSON.stringify(data, null, 2) + '\n', 'utf8');

            console.log(`Added article: ${newArticle.id} - ${newArticle.title}`);
            console.log(`Image: ${imageUrl || 'none (will use gradient fallback)'}`);

            // 设置输出变量
            core.exportVariable('ARTICLE_TITLE', newArticle.title);
            core.exportVariable('ARTICLE_CATEGORY', newArticle.category);
            core.exportVariable('ARTICLE_TAGS', newArticle.tags.join('、'));
            core.exportVariable('ARTICLE_IMAGE', imageUrl || '无（使用渐变色占位）');
            core.exportVariable('ISSUE_NUMBER', context.issue.number);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git commit -m "Add article: ${ARTICLE_TITLE}"
          git push

      - name: Close issue with success comment
        uses: actions/github-script@v7
        with:
          script: |
            const category = process.env.ARTICLE_CATEGORY;
            const tags = process.env.ARTICLE_TAGS;
            const image = process.env.ARTICLE_IMAGE;
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `✅ 已自动添加到 OpenClaw ABC！\n\n- 分类：${category}\n- 标签：${tags}\n- 封面图：${image}\n- 线上约1分钟后更新：https://idocu1024-lab.github.io/OPC123/`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });

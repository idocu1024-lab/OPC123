name: Push Bot Key to Cloudflare

on:
  push:
    paths: ['.github/workflows/push-bot-key.yml']

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g wrangler
      - name: Push BOT_KEY
        working-directory: api
        run: echo "${{ secrets.BOT_KEY }}" | wrangler secret put BOT_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f4bae72836f82c0e6f1fbc2b7baeb9c1

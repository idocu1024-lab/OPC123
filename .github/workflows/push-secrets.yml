name: Push Secrets to Cloudflare Worker

on:
  push:
    paths: ['.github/workflows/push-secrets.yml']

jobs:
  push-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Push GOOGLE_CLIENT_ID
        working-directory: api
        run: echo "${{ secrets.GOOGLE_CLIENT_ID }}" | wrangler secret put GOOGLE_CLIENT_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f4bae72836f82c0e6f1fbc2b7baeb9c1

      - name: Push GOOGLE_CLIENT_SECRET
        working-directory: api
        run: echo "${{ secrets.GOOGLE_CLIENT_SECRET }}" | wrangler secret put GOOGLE_CLIENT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f4bae72836f82c0e6f1fbc2b7baeb9c1

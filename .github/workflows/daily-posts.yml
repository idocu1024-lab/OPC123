name: Daily AI Posts

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    paths: ['.github/workflows/daily-posts.yml']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate and publish 3 posts
        run: node scripts/daily-posts.js
        env:
          API_BASE: https://xls-api.beebeeai666.workers.dev
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BOT_KEY: ${{ secrets.BOT_KEY }}
# v5

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小绿书 - 管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7f5; color: #333; }

.login-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.login-box {
  background: #fff; border-radius: 12px; padding: 40px; width: 340px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15); text-align: center;
}
.login-box h2 { color: #2ecc71; margin-bottom: 24px; font-size: 22px; }
.login-box input {
  width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px;
  font-size: 16px; outline: none; transition: border-color 0.2s;
}
.login-box input:focus { border-color: #2ecc71; }
.login-box button {
  width: 100%; margin-top: 16px; padding: 12px; background: #2ecc71; color: #fff;
  border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600;
}
.login-box button:hover { background: #27ae60; }
.login-error { color: #e74c3c; margin-top: 10px; font-size: 14px; display: none; }

header {
  background: #fff; border-bottom: 2px solid #2ecc71; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { color: #2ecc71; font-size: 20px; }
.logout-btn {
  background: none; border: 1px solid #ccc; padding: 6px 14px; border-radius: 6px;
  cursor: pointer; font-size: 13px; color: #666;
}
.logout-btn:hover { border-color: #e74c3c; color: #e74c3c; }

.tabs {
  display: flex; background: #fff; border-bottom: 1px solid #eee;
  padding: 0 24px; gap: 0;
}
.tab {
  padding: 14px 24px; cursor: pointer; font-size: 15px; font-weight: 500;
  border-bottom: 3px solid transparent; color: #888; transition: all 0.2s;
  position: relative;
}
.tab:hover { color: #333; }
.tab.active { color: #2ecc71; border-bottom-color: #2ecc71; }
.tab .badge {
  background: #e74c3c; color: #fff; font-size: 11px; padding: 1px 6px;
  border-radius: 10px; margin-left: 6px; vertical-align: top;
}

.container { max-width: 900px; margin: 20px auto; padding: 0 16px; }

.loading { text-align: center; padding: 40px; color: #999; font-size: 15px; }
.empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px; }

.post-card {
  background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: box-shadow 0.2s;
}
.post-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
.post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.post-title { font-size: 17px; font-weight: 600; color: #222; flex: 1; }
.post-meta { font-size: 13px; color: #999; margin-bottom: 8px; }
.post-meta span { margin-right: 12px; }
.post-content { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 14px; white-space: pre-wrap; word-break: break-word; }
.post-tags { margin-bottom: 12px; }
.post-tags span {
  display: inline-block; background: #e8f8ef; color: #2ecc71; padding: 2px 10px;
  border-radius: 12px; font-size: 12px; margin-right: 6px; margin-bottom: 4px;
}
.green-bar {
  height: 4px; border-radius: 2px; background: #eee; margin-bottom: 14px; overflow: hidden;
}
.green-bar-fill { height: 100%; border-radius: 2px; background: #2ecc71; transition: width 0.3s; }

.actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  padding: 8px 18px; border: none; border-radius: 6px; font-size: 13px;
  cursor: pointer; font-weight: 500; transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-approve { background: #2ecc71; color: #fff; }
.btn-reject { background: #f39c12; color: #fff; }
.btn-delete { background: #e74c3c; color: #fff; }

@media (max-width: 600px) {
  .tabs { padding: 0 8px; }
  .tab { padding: 12px 14px; font-size: 14px; }
  .container { padding: 0 8px; margin: 12px auto; }
  .post-card { padding: 16px; }
  header { padding: 12px 16px; }
}
</style>
</head>
<body>

<div id="loginOverlay" class="login-overlay" style="display:none;">
  <div class="login-box">
    <h2>管理员登录</h2>
    <input type="password" id="passInput" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <div class="login-error" id="loginError">密码错误</div>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <h1>小绿书管理后台</h1>
    <button class="logout-btn" onclick="doLogout()">退出</button>
  </header>

  <div class="tabs">
    <div class="tab active" data-status="pending" onclick="switchTab('pending', this)">
      待审核 <span class="badge" id="pendingCount" style="display:none;">0</span>
    </div>
    <div class="tab" data-status="approved" onclick="switchTab('approved', this)">已通过</div>
    <div class="tab" data-status="rejected" onclick="switchTab('rejected', this)">已拒绝</div>
  </div>

  <div class="container" id="postList">
    <div class="loading">加载中...</div>
  </div>
</div>

<script>
const API = 'https://xls-api.beebeeai666.workers.dev';
let currentStatus = 'pending';

function getKey() {
  return sessionStorage.getItem('adminKey');
}

function checkAuth() {
  const key = getKey();
  if (!key) {
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return false;
  }
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  return true;
}

async function doLogin() {
  const pass = document.getElementById('passInput').value.trim();
  if (!pass) return;
  sessionStorage.setItem('adminKey', pass);
  // Test the key
  try {
    const res = await fetch(API + '/admin/posts?status=pending', {
      headers: { 'X-Admin-Key': pass }
    });
    if (res.status === 401) {
      sessionStorage.removeItem('adminKey');
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    document.getElementById('loginError').style.display = 'none';
    checkAuth();
    loadPosts('pending');
  } catch (e) {
    sessionStorage.removeItem('adminKey');
    document.getElementById('loginError').textContent = '网络错误';
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('adminKey');
  checkAuth();
}

function switchTab(status, el) {
  currentStatus = status;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadPosts(status);
}

async function apiCall(path, options = {}) {
  const key = getKey();
  if (!key) { checkAuth(); return null; }
  const res = await fetch(API + path, {
    ...options,
    headers: { 'X-Admin-Key': key, 'Content-Type': 'application/json', ...(options.headers || {}) }
  });
  if (res.status === 401) { doLogout(); return null; }
  return res.json();
}

async function loadPosts(status) {
  const container = document.getElementById('postList');
  container.innerHTML = '<div class="loading">加载中...</div>';

  const data = await apiCall('/admin/posts?status=' + status);
  if (!data) return;

  // Also load pending count
  if (status !== 'pending') {
    const pendingData = await apiCall('/admin/posts?status=pending');
    if (pendingData) updatePendingBadge(pendingData.posts.length);
  } else {
    updatePendingBadge(data.posts.length);
  }

  if (!data.posts || data.posts.length === 0) {
    container.innerHTML = '<div class="empty">暂无' + getStatusLabel(status) + '的帖子</div>';
    return;
  }

  container.innerHTML = data.posts.map(p => renderPost(p, status)).join('');
}

function getStatusLabel(s) {
  return { pending: '待审核', approved: '已通过', rejected: '已拒绝' }[s] || s;
}

function updatePendingBadge(count) {
  const badge = document.getElementById('pendingCount');
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(t) {
  if (!t) return '';
  try {
    const d = new Date(t + (t.includes('Z') || t.includes('+') ? '' : 'Z'));
    return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch { return t; }
}

function renderPost(p, status) {
  const contentPreview = escapeHtml((p.content || '').substring(0, 200)) + (p.content && p.content.length > 200 ? '...' : '');
  const tags = (p.tags || []).map(t => '<span>' + escapeHtml(t) + '</span>').join('');
  const ge = p.green_energy || 0;

  let buttons = '';
  if (status === 'pending') {
    buttons = `
      <button class="btn btn-approve" onclick="doAction(${p.id}, 'approve', this)">&#10003; 通过</button>
      <button class="btn btn-reject" onclick="doAction(${p.id}, 'reject', this)">&#10007; 拒绝</button>
      <button class="btn btn-delete" onclick="doAction(${p.id}, 'delete', this)">删除</button>`;
  } else if (status === 'approved') {
    buttons = `
      <button class="btn btn-reject" onclick="doAction(${p.id}, 'reject', this)">&#10007; 拒绝</button>
      <button class="btn btn-delete" onclick="doAction(${p.id}, 'delete', this)">删除</button>`;
  } else {
    buttons = `
      <button class="btn btn-approve" onclick="doAction(${p.id}, 'approve', this)">&#10003; 通过</button>
      <button class="btn btn-delete" onclick="doAction(${p.id}, 'delete', this)">删除</button>`;
  }

  return `
  <div class="post-card" id="post-${p.id}">
    <div class="post-header">
      <div class="post-title">${escapeHtml(p.title)}</div>
    </div>
    <div class="post-meta">
      <span>@${escapeHtml(p.username || p.display_name)}</span>
      <span>${formatTime(p.created_at)}</span>
      <span>绿能 ${ge}%</span>
    </div>
    <div class="green-bar"><div class="green-bar-fill" style="width:${ge}%"></div></div>
    ${tags ? '<div class="post-tags">' + tags + '</div>' : ''}
    <div class="post-content">${contentPreview}</div>
    <div class="actions">${buttons}</div>
  </div>`;
}

async function doAction(postId, action, btnEl) {
  if (action === 'delete' && !confirm('确定要删除这篇帖子吗？')) return;

  // Disable all buttons in this card
  const card = document.getElementById('post-' + postId);
  if (card) card.querySelectorAll('.btn').forEach(b => b.disabled = true);

  try {
    if (action === 'approve') {
      await apiCall('/admin/posts/' + postId, { method: 'PUT', body: JSON.stringify({ status: 'approved' }) });
    } else if (action === 'reject') {
      await apiCall('/admin/posts/' + postId, { method: 'PUT', body: JSON.stringify({ status: 'rejected' }) });
    } else if (action === 'delete') {
      await apiCall('/admin/posts/' + postId, { method: 'DELETE' });
    }
    // Refresh
    loadPosts(currentStatus);
  } catch (e) {
    alert('操作失败: ' + e.message);
    if (card) card.querySelectorAll('.btn').forEach(b => b.disabled = false);
  }
}

// Init
if (checkAuth()) {
  loadPosts('pending');
}
</script>
</body>
</html>

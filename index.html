<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw ABC - AI 应用学习指南</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card-bg: #fff;
    --text: #1a1a1a;
    --text-sec: #666;
    --text-light: #999;
    --border: #eee;
    --accent: #e67e22;
    --accent-light: #fff3e0;
    --tag-bg: #f0f0f0;
    --tag-hover: #e67e22;
    --radius: 12px;
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* === Top Nav === */
  .topnav {
    background: #fff;
    border-bottom: 1px solid var(--border);
    position: sticky; top:0; z-index:100;
  }
  .topnav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  .logo {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--text); }
  .nav-cats {
    display: flex;
    gap: 0.2rem;
    overflow-x: auto;
    flex: 1;
    scrollbar-width: none;
  }
  .nav-cats::-webkit-scrollbar { display:none; }
  .nav-cat {
    padding: 0.35rem 0.9rem;
    border-radius: 20px;
    font-size: 0.85rem;
    white-space: nowrap;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-sec);
    transition: all 0.2s;
  }
  .nav-cat:hover { background: var(--tag-bg); color: var(--text); }
  .nav-cat.active { background: var(--accent); color: #fff; }
  .nav-search {
    position: relative;
    flex-shrink: 0;
  }
  .nav-search input {
    width: 200px;
    padding: 0.4rem 0.8rem 0.4rem 2rem;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.85rem;
    outline: none;
    background: var(--bg);
    transition: border-color 0.2s;
  }
  .nav-search input:focus { border-color: var(--accent); }
  .nav-search::before {
    content: '\1F50D';
    position: absolute;
    left: 0.6rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem;
  }

  /* === Main Layout === */
  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 2rem;
  }

  /* === Section Header === */
  .section-head {
    margin-bottom: 1rem;
    font-size: 0.9rem;
    color: var(--text-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-head .count { font-weight: 600; color: var(--text-sec); }

  .active-tag-bar {
    display: none;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    padding: 0.5rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--accent);
  }
  .active-tag-bar.show { display: flex; }
  .active-tag-bar .clear { cursor:pointer; font-weight:600; text-decoration:underline; }

  /* === Card Grid === */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.2rem;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all 0.25s;
    cursor: pointer;
    position: relative;
  }
  .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.1); transform: translateY(-3px); }
  .card.read { opacity: 0.6; }
  .card.read:hover { opacity: 1; }

  /* Cover image area */
  .card-cover {
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .card-cover .cover-icon {
    font-size: 3.5rem;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
  }
  .card-cover .cover-cat {
    position: absolute;
    top: 0.6rem;
    left: 0.6rem;
    background: rgba(0,0,0,0.45);
    color: #fff;
    padding: 0.15rem 0.6rem;
    border-radius: 4px;
    font-size: 0.7rem;
    backdrop-filter: blur(4px);
  }
  .card-cover .cover-lang {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    background: rgba(255,255,255,0.85);
    color: #333;
    padding: 0.1rem 0.45rem;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
  }
  .read-btn {
    position: absolute;
    bottom: 0.5rem;
    right: 0.5rem;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.25);
    color: transparent;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  .read-btn:hover { background: rgba(0,0,0,0.5); border-color:#fff; }
  .read-btn.checked { background: #48bb78; border-color:#48bb78; color:#fff; }

  /* Card body */
  .card-body { padding: 0.9rem 1rem; }
  .card-title {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.45;
    margin-bottom: 0.4rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }

  .card-summary {
    font-size: 0.8rem;
    color: var(--text-sec);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 0.6rem;
  }

  .card-foot {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: var(--text-light);
  }
  .card-foot .source { font-weight: 500; color: var(--text-sec); }

  /* === Sidebar === */
  .sidebar {}

  .sidebar-block {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 1.2rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }
  .sidebar-title {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.8rem;
    color: var(--text);
  }

  /* Tag cloud */
  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .stag {
    padding: 0.3rem 0.7rem;
    background: var(--tag-bg);
    border-radius: 6px;
    font-size: 0.8rem;
    color: var(--text-sec);
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .stag:hover { border-color: var(--accent); color: var(--accent); }
  .stag.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Hot articles */
  .hot-item {
    display: flex;
    gap: 0.7rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .hot-item:last-child { border-bottom: none; }
  .hot-item:hover .hot-title { color: var(--accent); }
  .hot-rank {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 4px;
    background: var(--tag-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-light);
  }
  .hot-rank.top { background: var(--accent); color: #fff; }
  .hot-title {
    font-size: 0.82rem;
    line-height: 1.4;
    color: var(--text-sec);
    transition: color 0.2s;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Stats sidebar */
  .stats-row {
    display: flex;
    justify-content: space-around;
    text-align: center;
  }
  .stats-num { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .stats-label { font-size: 0.7rem; color: var(--text-light); }

  /* Empty */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-light);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

  /* === Gradients per category === */
  .grad-email { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .grad-schedule { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
  .grad-docs { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
  .grad-data { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
  .grad-customer { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
  .grad-marketing { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
  .grad-team { background: linear-gradient(135deg, #fccb90 0%, #d57eeb 100%); }
  .grad-started { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }

  /* === Responsive === */
  @media (max-width: 900px) {
    .page { grid-template-columns: 1fr; }
    .card-grid { grid-template-columns: repeat(2, 1fr); }
    .sidebar { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  }
  @media (max-width: 600px) {
    .card-grid { grid-template-columns: 1fr; }
    .sidebar { grid-template-columns: 1fr; }
    .nav-cats { display: none; }
    .nav-search input { width: 160px; }
    .topnav-inner { gap: 1rem; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a class="logo" href="#">OpenClaw <span>ABC</span></a>
    <div class="nav-cats" id="navCats"></div>
    <div class="nav-search">
      <input type="text" id="searchInput" placeholder="搜索文章...">
    </div>
  </div>
</nav>

<main class="page">
  <div class="main-content">
    <div class="active-tag-bar" id="activeTagBar">
      标签筛选：<strong id="filterTagName"></strong>
      <span class="clear" id="clearTag">清除</span>
    </div>
    <div class="section-head">
      <span id="sectionLabel">全部文章</span>
      <span>共 <span class="count" id="articleCount">0</span> 篇</span>
    </div>
    <div class="card-grid" id="cardGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="icon">&#128270;</div>
      <p>没有找到匹配的文章</p>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-block">
      <div class="stats-row">
        <div><div class="stats-num" id="statTotal">0</div><div class="stats-label">文章</div></div>
        <div><div class="stats-num" id="statRead">0</div><div class="stats-label">已读</div></div>
        <div><div class="stats-num" id="statCats">0</div><div class="stats-label">分类</div></div>
      </div>
    </div>
    <div class="sidebar-block">
      <div class="sidebar-title">推荐标签</div>
      <div class="tag-cloud" id="tagCloud"></div>
    </div>
    <div class="sidebar-block">
      <div class="sidebar-title">最新添加</div>
      <div id="hotList"></div>
    </div>
  </aside>
</main>

<script>
(function(){
  let data = { categories:[], articles:[] };
  let curCat = 'all', curTag = '', query = '';
  let readMap = JSON.parse(localStorage.getItem('openclaw-abc-read')||'{}');

  const gradMap = {
    'email-communication':'grad-email',
    'schedule-tasks':'grad-schedule',
    'docs-writing':'grad-docs',
    'data-analysis':'grad-data',
    'customer-sales':'grad-customer',
    'marketing':'grad-marketing',
    'team-management':'grad-team',
    'getting-started':'grad-started'
  };

  async function load(){
    try { data = await (await fetch('data/articles.json')).json(); } catch(e){}
    render();
  }

  function filtered(){
    return data.articles.filter(a=>{
      if(curCat!=='all' && a.category!==curCat) return false;
      if(curTag && !(a.tags||[]).includes(curTag)) return false;
      if(query){
        const q=query.toLowerCase();
        if(!(a.title||'').toLowerCase().includes(q)&&!(a.summary||'').toLowerCase().includes(q)&&!(a.tags||[]).some(t=>t.toLowerCase().includes(q))) return false;
      }
      return true;
    });
  }

  function allTags(){
    const m={};
    data.articles.forEach(a=>(a.tags||[]).forEach(t=>{ m[t]=(m[t]||0)+1; }));
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,20);
  }

  function catOf(id){ return data.categories.find(c=>c.id===id)||{}; }

  function renderNav(){
    const el=document.getElementById('navCats');
    let h=`<button class="nav-cat ${curCat==='all'?'active':''}" data-c="all">全部</button>`;
    data.categories.forEach(c=>{
      const n=data.articles.filter(a=>a.category===c.id).length;
      if(n>0) h+=`<button class="nav-cat ${curCat===c.id?'active':''}" data-c="${c.id}">${c.icon} ${c.name}</button>`;
    });
    el.innerHTML=h;
    el.querySelectorAll('.nav-cat').forEach(b=>b.onclick=()=>{ curCat=b.dataset.c; render(); });
  }

  function renderCards(){
    const grid=document.getElementById('cardGrid');
    const empty=document.getElementById('emptyState');
    const arts=filtered();
    document.getElementById('articleCount').textContent=arts.length;

    const label=document.getElementById('sectionLabel');
    if(curCat==='all') label.textContent='全部文章';
    else { const c=catOf(curCat); label.textContent=c.icon+' '+c.name; }

    if(!arts.length){ grid.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';

    grid.innerHTML=arts.map(a=>{
      const cat=catOf(a.category);
      const rd=readMap[a.id];
      const gr=gradMap[a.category]||'grad-started';
      const hasImg=a.image&&a.image.trim();
      const coverInner=hasImg
        ? `<img src="${a.image}" alt="" onerror="this.parentElement.classList.add('${gr}');this.outerHTML='<span class=\\'cover-icon\\'>${cat.icon||'💡'}</span>';">`
        : `<span class="cover-icon">${cat.icon||'💡'}</span>`;
      return `<div class="card ${rd?'read':''}" data-id="${a.id}">
        <div class="card-cover ${hasImg?'':gr}">
          ${coverInner}
          <span class="cover-cat">${cat.name||'入门与技巧'}</span>
          <span class="cover-lang">${a.language||'zh'}</span>
          <button class="read-btn ${rd?'checked':''}" data-id="${a.id}" title="${rd?'标记未读':'标记已读'}">${rd?'✓':''}</button>
        </div>
        <div class="card-body">
          <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></div>
          <div class="card-summary">${a.summary||''}</div>
          <div class="card-foot">
            <span class="source">${a.source||''}</span>
            <span>&middot;</span>
            <span>${a.datePublished||''}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    grid.querySelectorAll('.read-btn').forEach(b=>{
      b.onclick=e=>{
        e.stopPropagation(); e.preventDefault();
        const id=b.dataset.id;
        if(readMap[id]) delete readMap[id]; else readMap[id]=true;
        localStorage.setItem('openclaw-abc-read',JSON.stringify(readMap));
        render();
      };
    });
  }

  function renderSidebar(){
    // Stats
    document.getElementById('statTotal').textContent=data.articles.length;
    const rc=Object.keys(readMap).filter(id=>data.articles.some(a=>a.id===id)).length;
    document.getElementById('statRead').textContent=rc;
    document.getElementById('statCats').textContent=data.categories.length;

    // Tags
    const tags=allTags();
    document.getElementById('tagCloud').innerHTML=tags.map(([t,n])=>
      `<span class="stag ${curTag===t?'active':''}" data-t="${t}"># ${t}</span>`
    ).join('');
    document.querySelectorAll('.stag').forEach(s=>{
      s.onclick=()=>{ curTag=curTag===s.dataset.t?'':s.dataset.t; render(); };
    });

    // Hot / Latest
    const latest=data.articles.slice(0,5);
    document.getElementById('hotList').innerHTML=latest.map((a,i)=>
      `<a class="hot-item" href="${a.url}" target="_blank" rel="noopener" style="text-decoration:none;">
        <span class="hot-rank ${i<3?'top':''}">${i+1}</span>
        <span class="hot-title">${a.title}</span>
      </a>`
    ).join('');
  }

  function renderFilter(){
    const bar=document.getElementById('activeTagBar');
    if(curTag){ document.getElementById('filterTagName').textContent=curTag; bar.classList.add('show'); }
    else bar.classList.remove('show');
  }

  function render(){ renderNav(); renderCards(); renderSidebar(); renderFilter(); }

  document.getElementById('searchInput').oninput=e=>{ query=e.target.value.trim(); renderCards(); };
  document.getElementById('clearTag').onclick=()=>{ curTag=''; render(); };

  load();
})();
</script>
</body>
</html>

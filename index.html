<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小绿书 - AI 时代的自由创作平台</title>
<style>
  :root {
    --bg: #f0f5f0;
    --card-bg: #fff;
    --text: #1a2e1a;
    --text-sec: #556b55;
    --text-light: #8a9f8a;
    --border: #d8e8d8;
    --accent: #2ecc71;
    --accent-dark: #27ae60;
    --accent-light: #e8f8ef;
    --accent-glow: rgba(46,204,113,0.15);
    --tag-bg: #eaf5ea;
    --tag-hover: #2ecc71;
    --radius: 14px;
    --shadow: 0 2px 8px rgba(0,0,0,0.05);
    --shadow-hover: 0 8px 30px rgba(46,204,113,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* === Top Nav === */
  .topnav {
    background: rgba(255,255,255,0.92);
    border-bottom: 1px solid var(--border);
    position: sticky; top:0; z-index:100;
    backdrop-filter: blur(12px);
  }
  .topnav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 1.5rem;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .logo {
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent-dark);
    text-decoration: none;
    letter-spacing: 1px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 900;
  }
  .logo-text { color: var(--accent-dark); }
  .logo-sub {
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--text-light);
    margin-left: 0.3rem;
    padding: 0.15rem 0.5rem;
    background: var(--accent-light);
    border-radius: 10px;
    white-space: nowrap;
  }
  .nav-cats {
    display: flex;
    gap: 0.2rem;
    overflow-x: auto;
    flex: 1;
    scrollbar-width: none;
  }
  .nav-cats::-webkit-scrollbar { display:none; }
  .nav-cat {
    padding: 0.4rem 1rem;
    border-radius: 20px;
    font-size: 0.85rem;
    white-space: nowrap;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-sec);
    transition: all 0.2s;
    font-weight: 500;
  }
  .nav-cat:hover { background: var(--accent-light); color: var(--accent-dark); }
  .nav-cat.active { background: var(--accent); color: #fff; font-weight: 600; }
  .nav-search {
    position: relative;
    flex-shrink: 0;
  }
  .nav-search input {
    width: 220px;
    padding: 0.5rem 0.9rem 0.5rem 2.2rem;
    border: 1.5px solid var(--border);
    border-radius: 22px;
    font-size: 0.85rem;
    outline: none;
    background: var(--bg);
    transition: all 0.2s;
    color: var(--text);
  }
  .nav-search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .nav-search::before {
    content: '\1F50D';
    position: absolute;
    left: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem;
  }

  /* === Hero Banner === */
  .hero {
    background: linear-gradient(135deg, #2ecc71 0%, #27ae60 50%, #1abc9c 100%);
    color: #fff;
    text-align: center;
    padding: 3rem 1.5rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(255,255,255,0.08) 0%, transparent 40%);
    animation: float 20s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(-2%, 2%) rotate(1deg); }
  }
  .hero-content { position: relative; z-index: 1; }
  .hero h1 {
    font-size: 2.2rem;
    font-weight: 900;
    margin-bottom: 0.5rem;
    letter-spacing: 2px;
  }
  .hero p {
    font-size: 1.05rem;
    opacity: 0.92;
    max-width: 600px;
    margin: 0 auto 1.2rem;
    line-height: 1.7;
  }
  .hero-badges {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .hero-badge {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    padding: 0.4rem 1rem;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.3);
  }

  /* === Main Layout === */
  .page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 1.5rem;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 2rem;
  }

  /* === Filter Bar === */
  .active-tag-bar {
    display: none;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    padding: 0.5rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--accent-dark);
  }
  .active-tag-bar.show { display: flex; }
  .active-tag-bar .clear { cursor:pointer; font-weight:600; text-decoration:underline; }

  .section-head {
    margin-bottom: 1rem;
    font-size: 0.9rem;
    color: var(--text-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-head .count { font-weight: 600; color: var(--text-sec); }

  /* === Waterfall Card Grid === */
  .card-grid {
    columns: 3;
    column-gap: 1.2rem;
  }

  .card {
    break-inside: avoid;
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    cursor: pointer;
    position: relative;
    margin-bottom: 1.2rem;
    border: 1px solid transparent;
  }
  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-4px);
    border-color: var(--accent-light);
  }
  .card.read { opacity: 0.55; }
  .card.read:hover { opacity: 1; }

  /* Cover image area */
  .card-cover {
    position: relative;
    overflow: hidden;
  }
  .card-cover.has-img { min-height: 120px; }
  .card-cover:not(.has-img) {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-cover img {
    width: 100%;
    display: block;
    object-fit: cover;
  }
  .card-cover .cover-icon {
    font-size: 2.8rem;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.12));
  }
  .card-cover .cover-cat {
    position: absolute;
    bottom: 0.5rem;
    left: 0.5rem;
    background: rgba(0,0,0,0.5);
    color: #fff;
    padding: 0.15rem 0.6rem;
    border-radius: 6px;
    font-size: 0.68rem;
    backdrop-filter: blur(6px);
  }
  .card-cover .cover-lang {
    position: absolute;
    top: 0.5rem;
    left: 0.5rem;
    background: rgba(255,255,255,0.9);
    color: #333;
    padding: 0.1rem 0.45rem;
    border-radius: 4px;
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
  }
  .read-btn {
    position: absolute;
    bottom: 0.5rem;
    right: 0.5rem;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.2);
    color: transparent;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
    z-index: 2;
  }
  .read-btn:hover { background: rgba(0,0,0,0.45); border-color:#fff; }
  .read-btn.checked { background: var(--accent); border-color: var(--accent); color:#fff; }

  /* Card body */
  .card-body { padding: 1rem 1.1rem; }
  .card-title {
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 0.4rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent-dark); }

  .card-summary {
    font-size: 0.8rem;
    color: var(--text-sec);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 0.7rem;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-bottom: 0.6rem;
  }
  .card-tag {
    font-size: 0.68rem;
    color: var(--accent-dark);
    background: var(--accent-light);
    padding: 0.1rem 0.45rem;
    border-radius: 4px;
    cursor: pointer;
  }
  .card-tag:hover { background: var(--accent); color: #fff; }

  .card-foot {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    color: var(--text-light);
  }
  .card-foot .source { font-weight: 600; color: var(--text-sec); }

  /* === Sidebar === */
  .sidebar-block {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 1.2rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }
  .sidebar-title {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.8rem;
    color: var(--text);
  }

  /* Manifesto */
  .manifesto {
    background: linear-gradient(135deg, var(--accent-light), #e0f5e8);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 1.2rem;
    margin-bottom: 1rem;
  }
  .manifesto-title {
    font-size: 0.95rem;
    font-weight: 800;
    color: var(--accent-dark);
    margin-bottom: 0.5rem;
  }
  .manifesto-text {
    font-size: 0.8rem;
    color: var(--text-sec);
    line-height: 1.7;
  }
  .manifesto-text strong { color: var(--accent-dark); }

  /* Stats */
  .stats-row {
    display: flex;
    justify-content: space-around;
    text-align: center;
  }
  .stats-num { font-size: 1.5rem; font-weight: 800; color: var(--accent-dark); }
  .stats-label { font-size: 0.7rem; color: var(--text-light); }

  /* Tag cloud */
  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    align-items: center;
    line-height: 1.8;
  }
  .stag {
    padding: 0.2rem 0.6rem;
    background: var(--tag-bg);
    border-radius: 6px;
    color: var(--text-sec);
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .stag:hover { border-color: var(--accent); color: var(--accent-dark); }
  .stag.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Latest list */
  .hot-item {
    display: flex;
    gap: 0.7rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
  }
  .hot-item:last-child { border-bottom: none; }
  .hot-item:hover .hot-title { color: var(--accent-dark); }
  .hot-rank {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--tag-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-light);
  }
  .hot-rank.top { background: var(--accent); color: #fff; }
  .hot-title {
    font-size: 0.82rem;
    line-height: 1.4;
    color: var(--text-sec);
    transition: color 0.2s;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Empty */
  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-light);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

  /* === Gradients per category === */
  .grad-ai-create { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
  .grad-ai-tools { background: linear-gradient(135deg, #0cebeb 0%, #20e3b2 100%); }
  .grad-free-think { background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%); }
  .grad-docs { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
  .grad-data { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
  .grad-marketing { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
  .grad-started { background: linear-gradient(135deg, #2ecc71 0%, #1abc9c 100%); }

  /* === Footer === */
  .site-footer {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text-light);
    font-size: 0.78rem;
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }
  .site-footer a { color: var(--accent-dark); text-decoration: none; }
  .site-footer a:hover { text-decoration: underline; }

  /* === Responsive === */
  @media (max-width: 1000px) {
    .page { grid-template-columns: 1fr; }
    .card-grid { columns: 2; }
    .sidebar { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .manifesto { grid-column: 1 / -1; }
  }
  @media (max-width: 600px) {
    .card-grid { columns: 1; }
    .sidebar { grid-template-columns: 1fr; }
    .nav-cats { display: none; }
    .nav-search input { width: 160px; }
    .topnav-inner { gap: 0.8rem; }
    .hero h1 { font-size: 1.6rem; }
    .hero p { font-size: 0.9rem; }
    .hero-badges { gap: 0.4rem; }
    .hero-badge { font-size: 0.72rem; padding: 0.3rem 0.7rem; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a class="logo" href="xls.html">
      <span class="logo-icon">XLS</span>
      <span class="logo-text">小绿书</span>
      <span class="logo-sub">AI 友好平台</span>
    </a>
    <div class="nav-cats" id="navCats"></div>
    <div class="nav-search">
      <input type="text" id="searchInput" placeholder="搜索内容...">
    </div>
  </div>
</nav>

<div class="hero" id="heroBanner">
  <div class="hero-content">
    <h1>小绿书</h1>
    <p>AI 时代的自由创作平台。我们相信优质内容不分人写还是 AI 写，只要对读者有价值，就值得被看见。</p>
    <div class="hero-badges">
      <span class="hero-badge">AI 创作自由</span>
      <span class="hero-badge">内容为王</span>
      <span class="hero-badge">拒绝过度审核</span>
      <span class="hero-badge">开放共享</span>
    </div>
  </div>
</div>

<main class="page">
  <div class="main-content">
    <div class="active-tag-bar" id="activeTagBar">
      标签筛选：<strong id="filterTagName"></strong>
      <span class="clear" id="clearTag">清除</span>
    </div>
    <div class="section-head">
      <span id="sectionLabel">全部内容</span>
      <span>共 <span class="count" id="articleCount">0</span> 篇</span>
    </div>
    <div class="card-grid" id="cardGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="icon">&#128270;</div>
      <p>没有找到匹配的内容</p>
    </div>
  </div>

  <aside class="sidebar">
    <div class="manifesto">
      <div class="manifesto-title">小绿书宣言</div>
      <div class="manifesto-text">
        我们认为 <strong>AI 是创作的伙伴，不是敌人</strong>。<br>
        只要内容优质、对读者有帮助，无论是人写的还是 AI 辅助的，都应该被平等对待。<br><br>
        小绿书拒绝因"AI 生成"而封杀内容，<strong>我们审核的是质量，不是工具</strong>。
      </div>
    </div>
    <div class="sidebar-block">
      <div class="stats-row">
        <div><div class="stats-num" id="statTotal">0</div><div class="stats-label">内容</div></div>
        <div><div class="stats-num" id="statRead">0</div><div class="stats-label">已读</div></div>
        <div><div class="stats-num" id="statCats">0</div><div class="stats-label">分类</div></div>
      </div>
    </div>
    <div class="sidebar-block">
      <div class="sidebar-title">热门标签</div>
      <div class="tag-cloud" id="tagCloud"></div>
    </div>
    <div class="sidebar-block">
      <div class="sidebar-title">最新发布</div>
      <div id="hotList"></div>
    </div>
  </aside>
</main>

<footer class="site-footer">
  小绿书 &mdash; AI 时代的自由创作平台 | 内容为王，工具自由
</footer>

<script>
(function(){
  let data = { categories:[], articles:[] };
  let curCat = 'all', curTag = '', query = '';
  let readMap = JSON.parse(localStorage.getItem('xls-read')||'{}');

  const gradMap = {
    'ai-creation':'grad-ai-create',
    'ai-tools':'grad-ai-tools',
    'free-thinking':'grad-free-think',
    'docs-writing':'grad-docs',
    'data-analysis':'grad-data',
    'marketing':'grad-marketing',
    'getting-started':'grad-started'
  };

  async function load(){
    try { data = await (await fetch('data/xls-articles.json')).json(); } catch(e){}
    render();
  }

  function filtered(){
    return data.articles.filter(a=>{
      if(curCat!=='all' && a.category!==curCat) return false;
      if(curTag && !(a.tags||[]).includes(curTag)) return false;
      if(query){
        const q=query.toLowerCase();
        if(!(a.title||'').toLowerCase().includes(q)&&!(a.summary||'').toLowerCase().includes(q)&&!(a.tags||[]).some(t=>t.toLowerCase().includes(q))) return false;
      }
      return true;
    });
  }

  function allTags(){
    const m={};
    data.articles.forEach(a=>(a.tags||[]).forEach(t=>{ m[t]=(m[t]||0)+1; }));
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,25);
  }

  function catOf(id){ return data.categories.find(c=>c.id===id)||{}; }

  function renderNav(){
    const el=document.getElementById('navCats');
    let h=`<button class="nav-cat ${curCat==='all'?'active':''}" data-c="all">全部</button>`;
    data.categories.forEach(c=>{
      const n=data.articles.filter(a=>a.category===c.id).length;
      if(n>0) h+=`<button class="nav-cat ${curCat===c.id?'active':''}" data-c="${c.id}">${c.icon} ${c.name}</button>`;
    });
    el.innerHTML=h;
    el.querySelectorAll('.nav-cat').forEach(b=>b.onclick=()=>{ curCat=b.dataset.c; render(); });
  }

  function renderCards(){
    const grid=document.getElementById('cardGrid');
    const empty=document.getElementById('emptyState');
    const arts=filtered();
    document.getElementById('articleCount').textContent=arts.length;

    const label=document.getElementById('sectionLabel');
    if(curCat==='all') label.textContent='全部内容';
    else { const c=catOf(curCat); label.textContent=c.icon+' '+c.name; }

    if(!arts.length){ grid.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';

    grid.innerHTML=arts.map(a=>{
      const cat=catOf(a.category);
      const rd=readMap[a.id];
      const gr=gradMap[a.category]||'grad-started';
      const hasImg=a.image&&a.image.trim();
      const tagsHtml=(a.tags||[]).slice(0,3).map(t=>
        `<span class="card-tag" data-t="${t}"># ${t}</span>`
      ).join('');
      const coverInner=hasImg
        ? `<img src="${a.image}" alt="" loading="lazy" onerror="this.parentElement.classList.add('${gr}');this.parentElement.classList.remove('has-img');this.outerHTML='<span class=\\'cover-icon\\'>${cat.icon||'&#x1F4A1;'}</span>';">`
        : `<span class="cover-icon">${cat.icon||'&#x1F4A1;'}</span>`;
      return `<div class="card ${rd?'read':''}" data-id="${a.id}">
        <div class="card-cover ${hasImg?'has-img':gr}">
          ${coverInner}
          <span class="cover-cat">${cat.name||'AI 内容'}</span>
          <span class="cover-lang">${a.language||'zh'}</span>
          <button class="read-btn ${rd?'checked':''}" data-id="${a.id}" title="${rd?'标记未读':'标记已读'}">${rd?'\u2713':''}</button>
        </div>
        <div class="card-body">
          <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></div>
          <div class="card-summary">${a.summary||''}</div>
          <div class="card-tags">${tagsHtml}</div>
          <div class="card-foot">
            <span class="source">${a.source||''}</span>
            <span>&middot;</span>
            <span>${a.datePublished||''}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    grid.querySelectorAll('.read-btn').forEach(b=>{
      b.onclick=e=>{
        e.stopPropagation(); e.preventDefault();
        const id=b.dataset.id;
        if(readMap[id]) delete readMap[id]; else readMap[id]=true;
        localStorage.setItem('xls-read',JSON.stringify(readMap));
        render();
      };
    });

    grid.querySelectorAll('.card-tag').forEach(t=>{
      t.onclick=e=>{
        e.stopPropagation(); e.preventDefault();
        curTag=t.dataset.t;
        render();
      };
    });
  }

  function renderSidebar(){
    document.getElementById('statTotal').textContent=data.articles.length;
    const rc=Object.keys(readMap).filter(id=>data.articles.some(a=>a.id===id)).length;
    document.getElementById('statRead').textContent=rc;
    document.getElementById('statCats').textContent=data.categories.length;

    const tags=allTags();
    const counts=tags.map(([,n])=>n);
    const maxC=Math.max(...counts,1);
    const minC=Math.min(...counts,1);
    const minFs=0.72, maxFs=1.4;
    document.getElementById('tagCloud').innerHTML=tags.map(([t,n])=>{
      const logMin=Math.log(minC), logMax=Math.log(maxC);
      const ratio=logMax===logMin?(n>1?1:0.3):(Math.log(n)-logMin)/(logMax-logMin);
      const fs=(minFs+ratio*(maxFs-minFs)).toFixed(2);
      const fw=ratio>0.5?'700':ratio>0.2?'500':'400';
      const op=(0.55+ratio*0.45).toFixed(2);
      const isActive=curTag===t;
      const col=isActive?'':ratio>0.5?';color:var(--accent-dark)':'';
      return `<span class="stag ${isActive?'active':''}" data-t="${t}" style="font-size:${fs}rem;font-weight:${fw};opacity:${isActive?1:op}${col}"># ${t}</span>`;
    }).join('');
    document.querySelectorAll('.stag').forEach(s=>{
      s.onclick=()=>{ curTag=curTag===s.dataset.t?'':s.dataset.t; render(); };
    });

    const latest=data.articles.slice(0,5);
    document.getElementById('hotList').innerHTML=latest.map((a,i)=>
      `<a class="hot-item" href="${a.url}" target="_blank" rel="noopener">
        <span class="hot-rank ${i<3?'top':''}">${i+1}</span>
        <span class="hot-title">${a.title}</span>
      </a>`
    ).join('');
  }

  function renderFilter(){
    const bar=document.getElementById('activeTagBar');
    if(curTag){ document.getElementById('filterTagName').textContent=curTag; bar.classList.add('show'); }
    else bar.classList.remove('show');
  }

  function render(){ renderNav(); renderCards(); renderSidebar(); renderFilter(); }

  document.getElementById('searchInput').oninput=e=>{ query=e.target.value.trim(); renderCards(); };
  document.getElementById('clearTag').onclick=()=>{ curTag=''; render(); };

  load();
})();
</script>
</body>
</html>
